<svg width="500" height="700" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #f5f7fa; }
    .card { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
    .title { font-family: Arial; font-size: 18px; font-weight: bold; fill: #111827; }
    .text { font-family: Arial; font-size: 14px; fill: #374151; }
    .label { font-family: Arial; font-size: 13px; fill: #6b7280; }
    .danger { fill: #fee2e2; }
    .danger-text { fill: #b91c1c; font-weight: bold; }
    .button-main { fill: #ef4444; }
    .button-secondary { fill: #e5e7eb; }
    .button-text { fill: white; font-weight: bold; font-family: Arial; font-size: 14px; }
    .button-text-dark { fill: #111827; font-family: Arial; font-size: 14px; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg"></rect>

  <!-- Main Card -->
  <rect x="25" y="20" width="450" height="660" rx="10" class="card"></rect>

  <!-- Header -->
  <text x="40" y="50" class="title">Fellowship Companion</text>

  <!-- Status -->
  <text x="40" y="90" class="label">Location</text>
  <text x="150" y="90" class="text">Near Moria</text>

  <text x="40" y="115" class="label">Risk Level</text>
  <text x="150" y="115" class="text">HIGH</text>

  <text x="40" y="140" class="label">Last Contact</text>
  <text x="150" y="140" class="text">5 min ago</text>

  <!-- Danger Box -->
  <rect x="40" y="170" width="410" height="90" rx="8" class="danger"></rect>
  <text x="50" y="200" class="danger-text">⚠ DANGER DETECTED</text>
  <text x="50" y="225" class="text">You are separated from the Fellowship</text>
  <text x="50" y="245" class="text">and may need immediate support.</text>

  <!-- Question -->
  <text x="40" y="290" class="text">What do you want to do?</text>

  <!-- Primary Button -->
  <rect x="40" y="310" width="410" height="55" rx="8" class="button-main"></rect>
  <text x="140" y="345" class="button-text">🚨 SEND EMERGENCY ALERT</text>

  <!-- Secondary Button -->
  <rect x="40" y="380" width="410" height="55" rx="8" class="button-secondary"></rect>
  <text x="150" y="415" class="button-text-dark">Wait / No Alert</text>

  <!-- Info -->
  <text x="40" y="460" class="label">If you send an alert:</text>
  <text x="50" y="485" class="text">• Location will be shared</text>
  <text x="50" y="505" class="text">• Danger will be reported</text>
  <text x="50" y="525" class="text">• Fellowship will be notified</text>

  <!-- Status -->
  <text x="40" y="580" class="label">Status</text>
  <text x="150" y="580" class="text">No alert sent</text>

</svg>